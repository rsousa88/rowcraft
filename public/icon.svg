  <!-- Column dividers in header -->
  <rect x="37" y="12" width="1" height="15" fill="#059669" fill-opacity="0.6"/>
  <rect x="61" y="12" width="1" height="15" fill="#059669" fill-opacity="0.6"/>

  <!-- Data row 1 — 54% width -->
  <rect x="12" y="34" width="54" height="15" rx="3" fill="white" fill-opacity="0.92"/>

  <!-- Data row 2 — 68% width -->
  <rect x="12" y="54" width="68" height="15" rx="3" fill="white" fill-opacity="0.68"/>

  <!-- Data row 3 — 40% width -->
